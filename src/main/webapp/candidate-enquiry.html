    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit', function (event) {
            event.preventDefault();

            const form = document.getElementById('contact-form');
            const formData = new FormData(form);

            // Validation logic
            if (!formData.get('name') || !formData.get('email') || !formData.get('phone') || !formData.get('role') || !formData.get('educationalQualification') || !formData.get('experience') || !formData.get('location') || !formData.get('resume')) {
                document.querySelector('#form_status').innerHTML = '<div class="alert alert-danger" role="alert">Please fill all the fields!</div>';
                return;
            }

            axios.post('http://localhost:8080/api/v1/candidate/form-submit', formData, {
                headers: {
                    'Content-Type': 'multipart/form-data',
                },
            })
            .then(response => {
                const responseData = response.data;
                if (responseData.success) {
                    document.querySelector('#form_status').innerHTML = `<div class="alert alert-success" role="alert">${responseData.message}</div>`;
                    alert(responseData.message);
                    form.reset(); // Reset form
                } else {
                    document.querySelector('#form_status').innerHTML = `<div class="alert alert-danger" role="alert">${responseData.message}</div>`;
                }
            })
            .catch(error => {
                let errorMessage = "Failed to submit form!";
                if (error.response && error.response.data) {
                    errorMessage = error.response.data.message || errorMessage;
                }
                document.querySelector('#form_status').innerHTML = `<div class="alert alert-danger" role="alert">${errorMessage}</div>`;
                alert(errorMessages);
            });
        });
    </script>
