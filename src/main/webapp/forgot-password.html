<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password</title>
    <!-- Tailwind CSS and DaisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.5.0/dist/full.css" rel="stylesheet">
    <style>
        .glassmorphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-700 flex justify-center items-center min-h-screen">
    <div class="glassmorphism p-8 w-96">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-semibold text-white">Forgot Password</h2>
            <p class="text-gray-300 text-sm">Enter your email to receive an OTP</p>
        </div>
        <div class="form-control">
            <label class="label">
                <span class="label-text text-gray-300">Email</span>
            </label>
            <input type="email" placeholder="Enter your email" class="input input-bordered bg-gray-800 text-white placeholder-gray-400">
        </div>
        <div class="form-control mt-6">
            <button class="btn btn-primary w-full transition-transform transform hover:scale-105">Send OTP</button>
        </div>
        <div class="text-center mt-4">
            <a href="admin-login.html" class="text-gray-300 hover:text-white transition">Back to Login</a>
        </div>
    </div>
</body>
</html>
